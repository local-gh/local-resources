# Deploys Kubernetes manifests via docker/kubectl_apply.sh to DigitalOcean Kubernetes (DOKS).
#
# Configure the GitHub Environment "production" (or repo-level secrets/variables):
#   Secrets:
#     KUBECONFIG_FILE           — Full kubeconfig content used by kubectl.
#     SOPS_AGE_KEY              — age private key (AGE-SECRET-KEY-1...) matching docker/.env.enc recipient age1f28gvdqfj0x4ssa2dwaj06sc77gqgrh48770jrvp5xvju8jt3a2q9pp7y4
#
# Optional secret when volumes/ssl/root.pass is missing (kubectl_apply.sh sources setup_ssl.sh):
#   PRODUCTION_SSL_ROOT_KEY_PASS — sets SSL_ROOT_KEY_PASS for non-interactive setup_ssl.sh in CI.
#
# The apply scripts also expect nginx basic auth under docker/volumes/nginx/ (see docker/.gitignore).
name: Production

on:
  workflow_dispatch:
    inputs:
      git_ref:
        description: 'Branch, tag, or commit SHA to deploy (defaults to the branch selected when running the workflow)'
        required: false
        type: string

permissions:
  contents: read

concurrency:
  group: production-kubernetes
  cancel-in-progress: false

jobs:
  deploy-kubernetes:
    name: Deploy Kubernetes cluster (DigitalOcean)
    runs-on: ubuntu-latest
    environment: production
    timeout-minutes: 120
    defaults:
      run:
        shell: bash

    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          ref: ${{ inputs.git_ref || github.ref }}

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y gettext-base openssl apache2-utils dos2unix util-linux

          SOPS_VERSION="3.13.1"
          curl -fsSL "https://github.com/getsops/sops/releases/download/v${SOPS_VERSION}/sops-v${SOPS_VERSION}.linux.amd64" -o /tmp/sops
          sudo install -m 0755 /tmp/sops /usr/local/bin/sops

          curl -fsSL "https://dl.k8s.io/release/$(curl -fsSL https://dl.k8s.io/release/stable.txt)/bin/linux/amd64/kubectl" -o /tmp/kubectl
          sudo install -m 0755 /tmp/kubectl /usr/local/bin/kubectl

          curl -fsSL https://raw.githubusercontent.com/helm/helm/main/scripts/get-helm-3 | bash

      - name: Write kubeconfig
        env:
          KUBECONFIG_CONTENT: ${{ secrets.KUBECONFIG_FILE }}
        run: |
          KUBECONFIG_FILE="${RUNNER_TEMP}/kubeconfig"
          if [[ -z "${KUBECONFIG_CONTENT}" ]]; then
            echo "KUBECONFIG_FILE secret is not set."
            exit 1
          fi
          printf '%s\n' "${KUBECONFIG_CONTENT}" > "${KUBECONFIG_FILE}"
          chmod 600 "${KUBECONFIG_FILE}"
          echo "KUBECONFIG_FILE=${KUBECONFIG_FILE}" >> "${GITHUB_ENV}"

      - name: Decrypt production .env
        env:
          SOPS_AGE_KEY: ${{ secrets.SOPS_AGE_KEY }}
        run: |
          if [[ -z "${SOPS_AGE_KEY}" ]]; then
            echo "SOPS_AGE_KEY secret is not set."
            exit 1
          fi
          if [[ ! -f "${GITHUB_WORKSPACE}/docker/.env.enc" ]]; then
            echo "Missing encrypted env file at docker/.env.enc."
            exit 1
          fi

          AGE_KEY_FILE="${RUNNER_TEMP}/age-key.txt"
          if [[ "${SOPS_AGE_KEY}" == age1* ]]; then
            echo "SOPS_AGE_KEY looks like a public key (age1...). Store the matching private key that starts with AGE-SECRET-KEY-1."
            exit 1
          fi
          if [[ "${SOPS_AGE_KEY}" != *'AGE-SECRET-KEY-1'* ]]; then
            echo "SOPS_AGE_KEY must be the full age private key containing AGE-SECRET-KEY-1."
            exit 1
          fi

          # Support multiline secrets and single-line secrets with literal \\n sequences.
          printf '%b' "${SOPS_AGE_KEY}" > "${AGE_KEY_FILE}"
          chmod 600 "${AGE_KEY_FILE}"
          export SOPS_AGE_KEY_FILE="${AGE_KEY_FILE}"
          unset SOPS_AGE_KEY

          sops --decrypt --input-type dotenv --output-type dotenv "${GITHUB_WORKSPACE}/docker/.env.enc" > "${GITHUB_WORKSPACE}/docker/.env"
          cp "${GITHUB_WORKSPACE}/docker/.env" "${GITHUB_WORKSPACE}/.env"

      - name: Apply Kubernetes stack
        working-directory: docker
        env:
          KUBECONFIG_FILE: ${{ env.KUBECONFIG_FILE }}
          SSL_ROOT_KEY_PASS: ${{ secrets.SSL_ROOT_KEY_PASS }}
        run: |
          if [[ ! -f ./volumes/ssl/root.pass && -z "${SSL_ROOT_KEY_PASS:-}" ]]; then
            echo "Missing docker/volumes/ssl/root.pass. Add it to the repo or set SSL_ROOT_KEY_PASS (kubectl_apply.sh runs setup_ssl.sh)."
            exit 1
          fi
          set -a
          source "${GITHUB_WORKSPACE}/.env"
          set +a
          # Pseudo-TTY so kubectl exec -it in kubectl_setup_core.sh works non-interactively.
          script -q -e -c "bash kubectl_apply.sh -c \"${KUBECONFIG_FILE}\""
